name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-general:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libfmt-dev libgtest-dev ninja-build libcurl4-openssl-dev libedit-dev

      - name: Configure & Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          cd build
          cpack -G DEB
          cpack -G TGZ
      
      - name: List Build Output
        run: ls -R build

      - uses: actions/upload-artifact@v4
        with:
          name: manifast-linux-x64-deb
          path: build/manifast-*.deb
      
      - uses: actions/upload-artifact@v4
        with:
          name: manifast-linux-x64-tgz
          path: build/manifast-*.tar.gz

  build-windows-general:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-fmt
            zip
            mingw-w64-ucrt-x86_64-nsis

      - name: Configure & Build
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(nproc)

      - name: Package
        shell: msys2 {0}
        run: |
          # Copy DLLs over before zipping
          mkdir -p build/bin
          ldd build/bin/mifast.exe | grep ucrt64 | awk '{print $3}' | xargs -I{} cp {} build/bin/ 2>/dev/null || true
          
          cd build
          cpack -G NSIS
          cpack -G ZIP

      - name: List Build Output
        shell: msys2 {0}
        run: ls -R build

      - uses: actions/upload-artifact@v4
        with:
          name: manifast-windows-x64-exe
          path: build/manifast-*.exe

      - uses: actions/upload-artifact@v4
        with:
          name: manifast-windows-x64-zip
          path: build/manifast-*.zip

  build-embedded-lib:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: manifast-embedded-linux-x64
          - os: windows-latest
            artifact_name: manifast-embedded-windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libfmt-dev

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-fmt
            zip

      - name: Configure & Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DMANIFAST_ENABLE_LLVM=OFF \
            -DMANIFAST_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target manifast_core

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja \
            -DMANIFAST_ENABLE_LLVM=OFF \
            -DMANIFAST_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target manifast_core

      - name: Create Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p embedded-dist/include embedded-dist/lib
          cp -r include/manifast embedded-dist/include/
          find build -name "libmanifast_core*" -type f -not -path "*/CMakeFiles/*" -exec cp {} embedded-dist/lib/ \;
          cd embedded-dist && zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Create Archive (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p embedded-dist/include embedded-dist/lib
          cp -r include/manifast embedded-dist/include/
          find build -name "*manifast_core*" -type f -not -path "*/CMakeFiles/*" -exec cp {} embedded-dist/lib/ \;
          cd embedded-dist && zip -r ../${{ matrix.artifact_name }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    needs: [build-linux-general, build-windows-general, build-embedded-lib]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/manifast-linux-x64-deb/*
            artifacts/manifast-linux-x64-tgz/*
            artifacts/manifast-windows-x64-exe/*
            artifacts/manifast-windows-x64-zip/*
            artifacts/manifast-embedded-linux-x64/*
            artifacts/manifast-embedded-windows-x64/*
          generate_release_notes: true
