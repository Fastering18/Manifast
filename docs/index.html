<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifast Playground | Indonesian-Syntax High-Performance Language</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/one-dark.min.css">
    <style>
        :root {
            --bg-deep: hsl(222, 25%, 6%);
            --bg-surface: hsl(222, 25%, 10%);
            --bg-glass: rgba(22, 27, 34, 0.7);
            --text-primary: hsl(210, 40%, 98%);
            --text-secondary: hsl(210, 20%, 70%);
            --accent: hsl(212, 100%, 65%);
            --accent-glow: hsla(212, 100%, 65%, 0.3);
            --border: hsl(215, 20%, 20%);
            --border-light: hsla(215, 20%, 30%, 0.5);
            --success: hsl(142, 70%, 50%);
            --error: hsl(0, 84%, 60%);
            --warning: hsl(38, 92%, 50%);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 0.65rem;
            background: var(--bg-surface);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 99px;
            border: 1px solid var(--border);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.7;
            }
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }

        .example-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .example-item {
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid transparent;
        }

        .example-item:hover {
            background: hsla(212, 100%, 65%, 0.1);
            color: var(--accent);
        }

        .example-item.active {
            background: hsla(212, 100%, 65%, 0.15);
            color: var(--text-primary);
            font-weight: 600;
            border-left-color: var(--accent);
        }

        .main-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .pane-header {
            padding: 0.4rem 1rem;
            background: var(--bg-deep);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #editor-container {
            flex: 1;
            background: var(--bg-deep);
            overflow: hidden;
        }

        .console-area {
            height: 35%;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #000;
        }

        #output {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #d1d5db;
        }

        #output img {
            max-width: 600px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 12px 0;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: var(--error);
            display: none;
        }

        .btn-stop:hover {
            box-shadow: 0 4px 12px hsla(0, 84%, 60%, 0.3);
        }

        .btn-sm {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 3px 8px;
            font-size: 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-sm:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: var(--bg-surface);
        }

        /* CodeMirror Syntax Styling */
        .cm-s-one-dark .cm-keyword {
            color: #c678dd;
            font-weight: bold;
        }

        .cm-s-one-dark .cm-string {
            color: #98c379;
        }

        .cm-s-one-dark .cm-builtin {
            color: #61afef;
        }

        .cm-s-one-dark .cm-number {
            color: #d19a66;
        }

        .cm-s-one-dark .cm-comment {
            color: #5c6370;
            font-style: italic;
        }

        .cm-s-one-dark .cm-operator {
            color: #56b6c2;
        }

        .cm-s-one-dark .cm-variable {
            color: #ffffff;
        }

        .cm-s-one-dark .cm-property {
            color: #e06c75;
        }

        .cm-s-one-dark .CodeMirror-cursor {
            border-left: 2px solid var(--accent) !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'JetBrains Mono', 'Consolas', monospace !important;
            font-size: 14px;
            background: transparent !important;
            color: white !important;
        }

        .CodeMirror-gutters {
            background: var(--bg-deep) !important;
            border-right: 1px solid var(--border) !important;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader p {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .shortcut-hint {
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-left: 8px;
        }
    </style>
</head>

<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>INITIALIZING VM...</p>
    </div>

    <header>
        <div class="brand">
            <span class="logo-text">MANIFAST</span>
            <span class="version-badge">v0.0.13</span>
        </div>

        <div class="status-container">
            <div class="status-indicator">
                <div class="pulse-dot"></div>
                WASM VM ACTIVE
            </div>

            <div style="display: flex; gap: 8px;">
                <button class="btn btn-run" id="btnRun" onclick="runCode()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    RUN
                </button>
                <button class="btn btn-stop" id="btnStop" onclick="stopPlayback()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" />
                    </svg>
                    STOP
                </button>
            </div>
            <span class="shortcut-hint">Ctrl+Enter</span>
        </div>
    </header>

    <div class="workspace">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>Examples</span>
                <div style="display: flex; gap: 4px;">
                    <button class="btn-sm" onclick="createNewExample()" title="New Example">+</button>
                    <button class="btn-sm" id="btnDeleteExample" onclick="deleteCurrentExample()" title="Delete Example"
                        style="display: none; color: var(--error); border-color: var(--error);">–</button>
                </div>
            </div>
            <div class="example-list" id="example-list"></div>
        </aside>

        <div class="main-editor">
            <div class="pane-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    main.mnf
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span id="timing"
                        style="color: var(--accent); font-weight: 500; font-family: 'JetBrains Mono';"></span>
                    <button class="btn-sm" onclick="copyCode()">COPY</button>
                </div>
            </div>
            <div id="editor-container"></div>

            <div class="console-area">
                <div class="pane-header">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3">
                            <polyline points="4 17 10 11 4 5" />
                            <line x1="12" y1="19" x2="20" y2="19" />
                        </svg>
                        Terminal
                    </div>
                    <button class="btn-sm" onclick="document.getElementById('output').innerHTML = ''">CLEAR</button>
                </div>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/mode/simple.min.js"></script>

    <script>
        CodeMirror.defineSimpleMode("manifast", {
            start: [
                { regex: /--.*/, token: "comment" },
                { regex: /"(?:[^\\]|\\.)*?(?:"|$)/, token: "string" },
                { regex: /'(?:[^\\]|\\.)'/, token: "string" },
                { regex: /\b(?:fungsi|jika|kalau|sebaliknya|maka|tutup|kembali|lokal|untuk|ke|lakukan|selama|selagi|dan|atau|bukan|kelas|self|impor|benar|salah|nil|tetap|coba|tangkap|tipe)\b/, token: "keyword" },
                { regex: /\b(?:i8|i16|i32|i64|u8|u16|u32|u64|f32|f64|angka|char|string|boolean)\b/, token: "builtin" },
                { regex: /\b(?:print|println|tunggu|input|assert|exit|waktuNano|clearOutput|len|sin|cos|tan|sqrt|abs|floor|ceil|pow|log|exp)\b/, token: "builtin" },
                { regex: /\b\d+\.?\d*\b/, token: "number" },
                { regex: /[+\-*/%<>=!&|^]/, token: "operator" },
            ],
            meta: { lineComment: "--" }
        });

        window.editor = CodeMirror(document.getElementById("editor-container"), {
            value: "-- Loading...",
            mode: "manifast",
            theme: "one-dark",
            lineNumbers: true,
            tabSize: 2,
            indentWithTabs: false,
            viewportMargin: Infinity,
            extraKeys: {
                "Ctrl-Enter": () => runCode(),
                "Cmd-Enter": () => runCode()
            }
        });

        const defaultExamples = {
            fib: {
                name: "Fibonacci",
                code: `-- Fibonacci Recursion\nlokal os = impor("os")\n\nfungsi fib(n)\n  jika n < 2 maka kembali n tutup\n  kembali fib(n-1) + fib(n-2)\ntutup\n\nlokal t0 = os.waktuNano()\nlokal h = fib(20)\nlokal t1 = os.waktuNano()\n\nprintln("fib(20) =", h)\nprintln("Waktu:", (t1 - t0) / 1000000, "ms")`
            },
            fizzbuzz: {
                name: "FizzBuzz",
                code: `untuk i = 1 ke 20 lakukan\n  jika i % 15 == 0 maka println("FizzBuzz")\n  kalau i % 3 == 0 maka println("Fizz")\n  kalau i % 5 == 0 maka println("Buzz")\n  sebaliknya println(i)\n  tutup\ntutup`
            },
            plot: {
                name: "Plot Chart",
                code: `lokal plot = impor("plot")\nlokal x = []\nlokal y = []\n\nuntuk i = 0 ke 20 lakukan\n  x.push(i)\n  y.push(sin(i/2))\ntutup\n\nplot.line(x, y, { title: "Sine Wave Demo", xlabel: "Radians", ylabel: "Magnitude" })\nplot.show()\nprintln("Plot rendered successfully!")`
            },
            newton: {
                name: "Newton-Raphson",
                code: `-- Newton-Raphson Method\n-- x_{n+1} = x_n - f(x_n)/f'(x_n)\n\ntipe fnAngka = fungsi(angka): angka\nfungsi nr(xn: angka, f: fnAngka, fd: fnAngka): angka\n  kembali xn - f(xn)/fd(xn)\ntutup\n\n-- target: y = x^2 + 7x + 6\n-- derivative: dy/dx = 2x + 7\nlokal f = fungsi(x) kembali x*x + 7*x + 6 tutup\nlokal fd = fungsi(x) kembali 2*x + 7 tutup\n\nprintln("# Finding roots with xn = 1")\nlokal xn = 1.0\nprintln("i", "xn")\nuntuk i = 1 ke 6 lakukan\n  println(i, xn)\n  xn = nr(xn, f, fd)\ntutup\n\nprintln("\\nFinal Root: ", xn)`
            },
            error_calc: {
                name: "Numerical Error",
                code: `-- Numerical Error Function example\nlokal math = impor("math")\n\nfungsi hitung_error(v_true: angka, v_approx: angka): angka\n  jika v_true == 0 maka kembali math.abs(v_approx) tutup\n  kembali math.abs((v_true - v_approx) / v_true) * 100\ntutup\n\nlokal t = math.pi\nlokal a = 3.14\n\nlokal err = hitung_error(t, a)\nprintln("Nilai Sebenarnya: ", t)\nprintln("Nilai Aproksimasi: ", a)\nprintln("Relative Error: ", err, "%")`
            },
            oop: {
                name: "Class & Objects",
                code: `kelas Mobil maka\n  fungsi inisiasi(merk, thn)\n    self.merk = merk\n    self.thn = thn\n  tutup\n\n  fungsi info()\n    println("Mobil: " + self.merk + " (" + self.thn + ")")\n  tutup\ntutup\n\nlokal m1 = Mobil("Toyota", 2022)\nm1.info()`
            },
            mandelbrot: {
                name: "Mandelbrot Animated",
                code: `lokal os = impor("os")\n\nfungsi gambar(iterasi)\n  os.clearOutput()\n  println("Mandelbrot [Depth: " + iterasi + "]")\n  untuk y = 0 ke 20 lakukan\n    lokal cy = (y/20)*2 - 1\n    untuk x = 0 ke 60 lakukan\n      lokal cx = (x/60)*2.5 - 1.75\n      lokal zx = 0; lokal zy = 0; lokal i = 0\n      selama (zx*zx + zy*zy < 4) dan (i < iterasi) lakukan\n        lokal t = zx*zx - zy*zy + cx\n        zy = 2*zx*zy + cy\n        zx = t\n        i = i + 1\n      tutup\n      jika i == iterasi maka print("#") sebaliknya print(" ") tutup\n    tutup\n    println("")\n  tutup\ntutup\n\nuntuk i = 1 ke 24 lakukan\n  gambar(i)\n  os.tunggu(30)\ntutup\nprintln("Done!")`
            },
            ascii_heart: {
                name: "Heart ASCII Art",
                code: `-- Heart ASCII Art\nlokal math = impor("math")\n\nuntuk y = 1.5 ke -1.5 langkah -0.1 lakukan\n  untuk x = -1.5 ke 1.5 langkah 0.05 lakukan\n    lokal a = x*x + y*y - 1\n    jika a*a*a - x*x*y*y*y <= 0 maka\n      print("*")\n    sebaliknya\n      print(" ")\n    tutup\n  tutup\n  println("")\ntutup\nprintln("\\nManifast ❤️ ASCII")`
            }
        };

        const STORAGE_KEY = 'manifast_playground_custom_v1';
        let customExamples = {};
        let currentExampleKey = 'fib';

        function loadCustom() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) customExamples = JSON.parse(data);
            } catch (e) {
                console.error("Failed to load custom examples", e);
            }
        }

        function saveCustom() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(customExamples));
        }

        function createNewExample() {
            const name = prompt("Enter name for new example:", "Custom Script");
            if (!name) return;
            const key = 'custom_' + Date.now();
            customExamples[key] = {
                name: name,
                code: window.editor.getValue() || "-- Start coding here..."
            };
            saveCustom();
            initSidebar();
            selectExample(key);
        }

        function deleteCurrentExample() {
            if (!currentExampleKey.startsWith('custom_')) return;
            if (!confirm(`Delete example "${customExamples[currentExampleKey].name}"?`)) return;
            delete customExamples[currentExampleKey];
            saveCustom();
            initSidebar();
            selectExample('fib');
        }

        function selectExample(key) {
            currentExampleKey = key;
            const all = { ...defaultExamples, ...customExamples };
            const ex = all[key];
            if (!ex) return;

            window.editor.setValue(ex.code);
            document.querySelectorAll('.example-item').forEach(i => {
                i.classList.toggle('active', i.dataset.key === key);
            });

            // Toggle delete button
            document.getElementById('btnDeleteExample').style.display = key.startsWith('custom_') ? 'inline-block' : 'none';
        }

        function initSidebar() {
            const list = document.getElementById('example-list');
            list.innerHTML = '';
            const all = { ...defaultExamples, ...customExamples };

            Object.keys(all).forEach(key => {
                const item = document.createElement('div');
                item.className = 'example-item';
                item.dataset.key = key;
                if (key === currentExampleKey) item.classList.add('active');

                const isCustom = key.startsWith('custom_');
                item.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg> 
                    ${all[key].name}
                    ${isCustom ? '<span style="font-size: 10px; opacity: 0.5; margin-left: auto;">User</span>' : ''}
                `;
                item.onclick = () => selectExample(key);
                list.appendChild(item);
            });
        }

        // --- Playback Engine ---
        let playbackId = 0;
        let isRunning = false;

        function setRunning(running) {
            isRunning = running;
            document.getElementById('btnRun').style.display = running ? 'none' : 'flex';
            document.getElementById('btnStop').style.display = running ? 'flex' : 'none';
        }

        function stopPlayback() {
            playbackId++;
            setRunning(false);
            console.log("[Manifast] Playback stopped by user");
        }

        async function runCode() {
            if (!window.Module || !window.Module.ccall) {
                alert("WASM not loaded yet!");
                return;
            }

            const code = window.editor.getValue();
            const outputEl = document.getElementById('output');
            const timingEl = document.getElementById('timing');

            playbackId++;
            const currentId = playbackId;
            setRunning(true);
            outputEl.innerHTML = '<span style="color: hsla(200, 100%, 70%, 0.8)"> > Executing...</span>\n';
            timingEl.innerText = '';

            console.log("[Manifast] Running script...");
            const startTime = performance.now();

            try {
                window.Module.ccall('mf_run_script_tier', 'string', ['string', 'number'], [code, 0]);

                const endTime = performance.now();
                timingEl.innerText = `${((endTime - startTime) / 1000).toFixed(3)}s`;
            } catch (err) {
                console.error("[Manifast] Execution error:", err);
                const span = document.createElement('span');
                span.style.color = 'var(--error)';
                let msg = err.message || "Unknown error";
                span.textContent = "\n[ERROR] " + msg + "\n";
                outputEl.appendChild(span);
            } finally {
                if (currentId === playbackId) setRunning(false);
            }
        }

        function copyCode() {
            const btn = document.querySelector('.btn-sm');
            navigator.clipboard.writeText(window.editor.getValue()).then(() => {
                const orig = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.style.borderColor = 'var(--success)';
                btn.style.color = 'var(--success)';
                setTimeout(() => { btn.innerText = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
            });
        }
    </script>
    <script src="manifast.js"></script>
    <script>
        // MODULARIZE=1 requires calling the factory function
        ManifastModule({
            print: (text) => console.log("[MF stdout]", text),
            printErr: (text) => console.warn("[MF stderr]", text)
        }).then(function (Module) {
            window.Module = Module;
            console.log("[Manifast] WASM VM loaded successfully");
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);

            // Register event callback (vii = void, int, int/ptr)
            try {
                const eventCallback = Module.addFunction((type, dataPtr) => {
                    const data = Module.UTF8ToString(dataPtr);
                    const outputEl = document.getElementById('output');
                    if (type === 0) {
                        const span = document.createElement('span');
                        span.textContent = data;
                        outputEl.appendChild(span);
                    } else if (type === 2) {
                        const img = document.createElement('img');
                        img.src = data;
                        outputEl.appendChild(img);
                    } else if (type === 3) {
                        outputEl.innerHTML = '';
                    }
                    outputEl.scrollTop = outputEl.scrollHeight;
                }, 'vii');
                if (Module._mf_set_event_callback) {
                    Module._mf_set_event_callback(eventCallback);
                }
            } catch (e) {
                console.warn("[Manifast] addFunction not available, using return-string mode", e);
            }

            loadCustom();
            initSidebar();
            selectExample('fib');
        }).catch(function (err) {
            console.error("[Manifast] Failed to initialize WASM:", err);
            document.querySelector('#loader p').textContent = 'Failed to load WASM: ' + err.message;
            document.querySelector('#loader p').style.color = 'var(--error)';
        });
    </script>
